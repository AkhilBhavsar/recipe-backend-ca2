version: '3.8'

services:

  mongo:
    image: mongo:7.0
    container_name: recipe-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ead_ca2
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - recipe-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recipe-backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: ead_ca2
      MONGO_COLLECTION: ead_2024
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - recipe-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recipe-frontend
    restart: unless-stopped
    ports:
      - "22137:22137"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - recipe-network

networks:
  recipe-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local